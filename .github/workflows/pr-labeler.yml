name: "PR Setup"

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-setup:
    name: Label & Assign Reviewer
    runs-on: ubuntu-latest
    if: contains(fromJson('["main", "master"]'), github.event.pull_request.base.ref)
    steps:
      - name: Auto Label and Request Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title.toLowerCase();
            const labels = [];

            // --- Label based on title ---
            const skipPrefixes = ['chore', 'ci', 'style', 'test', 'refactor'];
            if (skipPrefixes.some(p => title.startsWith(p + ':') || title.startsWith(p + '('))) {
              labels.push('skip-release-notes');
            }

            if (title.includes('feat') || title.includes('feature')) {
              labels.push('feature');
            } else if (title.includes('fix') || title.includes('bug')) {
              labels.push('bug');
            } else if (title.includes('docs') || title.includes('doc')) {
              labels.push('docs');
            } else if (title.includes('refactor')) {
              labels.push('refactor');
            }

            labels.push('release');

            // Apply labels
            if (labels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: labels
                });
                console.log(`Added labels: ${labels.join(', ')}`);
              } catch (error) {
                if (error.status === 422) {
                  const labelConfigs = {
                    'skip-release-notes': { color: '6c757d', description: 'Skip in release notes' },
                    'feature': { color: '0e8a16', description: 'New feature' },
                    'bug': { color: 'd73a4a', description: 'Bug fix' },
                    'docs': { color: '0052cc', description: 'Documentation' },
                    'refactor': { color: 'fbca04', description: 'Code refactoring' },
                    'release': { color: 'e83e8c', description: 'Production release PR' }
                  };
                  for (const label of labels) {
                    if (labelConfigs[label]) {
                      try {
                        await github.rest.issues.createLabel({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          name: label,
                          color: labelConfigs[label].color,
                          description: labelConfigs[label].description
                        });
                      } catch (e) { /* label may already exist */ }
                    }
                  }
                  // Retry
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.number,
                    labels: labels
                  }).catch(e => console.log(`Label retry failed: ${e.message}`));
                }
              }
            }

            // --- Request review ---
            if (pr.draft) {
              console.log('PR is draft, skipping review request');
              return;
            }

            const reviewer = 'dhwani-ankit';
            try {
              const { data: currentReviews } = await github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              const alreadyRequested = currentReviews.users?.some(
                u => u.login.toLowerCase() === reviewer.toLowerCase()
              );

              if (!alreadyRequested) {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  reviewers: [reviewer],
                });
                console.log(`Requested review from ${reviewer}`);
              }
            } catch (error) {
              console.log(`Could not request review: ${error.message}`);
              // Fallback: add as assignee
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  assignees: [reviewer],
                });
              } catch (e) { /* ignore */ }
            }
