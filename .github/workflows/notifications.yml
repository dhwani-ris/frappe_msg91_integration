name: Workflow Notifications

on:
  workflow_run:
    workflows:
      - "CI"
      - "Generate Semantic Release"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  notify-on-failure:
    name: Notify on Critical Failures
    runs-on: ubuntu-latest
    if: |
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Get workflow run details and notify
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const workflowName = run.name;
            const workflowUrl = run.html_url;
            const commitSha = run.head_sha.substring(0, 7);
            const branch = run.head_branch;
            const actor = run.actor.login;

            // Get commit message
            let commitMessage = 'N/A';
            try {
              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: run.head_sha
              });
              commitMessage = commit.commit.message.split('\n')[0];
            } catch (e) {
              console.log('Could not fetch commit details:', e.message);
            }

            const title = `🚨 Workflow Failure: ${workflowName}`;
            const body = `## Workflow Failure Alert

            **Workflow:** ${workflowName}
            **Branch:** \`${branch}\`
            **Commit:** ${commitSha} — ${commitMessage}
            **Triggered by:** @${actor}

            [View failed workflow run](${workflowUrl})

            ---
            *Auto-generated by workflow notification system.*`;

            // Check for existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'workflow-failure'
            });

            const existing = issues.find(i =>
              i.title.includes(workflowName) && i.body.includes(commitSha)
            );

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['workflow-failure', 'bug']
              });
            }

      - name: Send Slack notification (optional)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 ${GITHUB_REPOSITORY}: ${{ github.event.workflow_run.name }} failed on ${{ github.event.workflow_run.head_branch }}. ${{ github.event.workflow_run.html_url }}\"}" \
            $SLACK_WEBHOOK_URL || true

  notify-on-success:
    name: Notify on Release Success
    runs-on: ubuntu-latest
    if: |
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master') &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Generate Semantic Release'

    steps:
      - name: Check for new release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            if (releases.length === 0) {
              console.log('No releases found');
              return;
            }

            const latest = releases[0];
            const diffMinutes = (new Date() - new Date(latest.created_at)) / (1000 * 60);

            if (diffMinutes > 10) {
              console.log('Release older than 10 minutes, skipping');
              return;
            }

            console.log(`New release: ${latest.tag_name}`);
